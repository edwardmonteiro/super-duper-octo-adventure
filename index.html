<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Quantum Journey</title>
  <meta name="description" content="15 minutes a day from classical physics to quantum computing.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./assets/style.css">
</head>
<body>
  <header class="shell-header">
    <a class="brand" href="./">
      <svg viewBox="0 0 24 24" width="22" height="22" aria-hidden="true" class="brand-icon">
        <ellipse cx="12" cy="12" rx="10" ry="4" fill="none" stroke="currentColor" stroke-width="1.5"/>
        <ellipse cx="12" cy="12" rx="10" ry="4" fill="none" stroke="currentColor" stroke-width="1.5" transform="rotate(60 12 12)"/>
        <ellipse cx="12" cy="12" rx="10" ry="4" fill="none" stroke="currentColor" stroke-width="1.5" transform="rotate(-60 12 12)"/>
        <circle cx="12" cy="12" r="1.6" fill="currentColor"/>
      </svg>
      <span data-i18n="brand">Quantum Journey</span>
    </a>
    <div class="shell-controls">
      <div class="lang-toggle" role="group" aria-label="Language">
        <button data-lang="en" aria-pressed="true">EN</button>
        <button data-lang="pt-BR" aria-pressed="false">PT-BR</button>
      </div>
      <div class="streak" title="Streak" aria-label="Streak">
        <svg viewBox="0 0 24 24" width="16" height="16" aria-hidden="true">
          <path d="M12 2.5c.8 3 3.2 4 3.2 7.2a3.2 3.2 0 0 1-6.4 0c0-1.5.8-2.2.8-4 0 1.6 1.6 1.5 2.4-3.2z" fill="currentColor"/>
          <path d="M12 22c3.5 0 6-2.4 6-5.7 0-2.8-2.2-4-3.3-6.3-.2 2.4-1.7 3.6-2.7 3.6-1.5 0-2-1.3-2-2.6-1.8 1.5-4 3-4 5.6C6 19.6 8.5 22 12 22z" fill="currentColor" opacity="0.55"/>
        </svg>
        <span class="streak-count">0</span>
      </div>
    </div>
  </header>

  <main class="landing">
    <section class="hero">
      <h1 data-i18n="hero.title">15 minutes a day to quantum.</h1>
      <p class="lede" data-i18n="hero.lede">A daily micro-lesson, from classical physics to quantum computing.</p>
    </section>

    <section class="day-grid" id="dayGrid" aria-label="Days"></section>

    <section class="meter">
      <span class="xp">XP <strong id="xpValue">0</strong></span>
      <span class="progress">
        <span data-i18n="progress.label">Day</span>
        <strong id="progressDay">1</strong>
        <span data-i18n="progress.of">of</span>
        <strong id="progressTotal">1</strong>
      </span>
    </section>
  </main>

  <dialog id="lessonModal" class="lesson-modal" aria-label="Lesson">
    <button class="modal-close" aria-label="Close" data-action="close">&times;</button>
    <iframe id="lessonFrame" title="Lesson" src="about:blank" referrerpolicy="no-referrer"></iframe>
  </dialog>

  <script type="module" src="./assets/shell.js"></script>
</body>
</html>
